            <div class="flex-1 overflow-y-auto custom-scrollbar p-6">

    <div id="toast" class="fixed top-20 right-6 z-50 hidden-el animate-fade-in">

            <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> 紀錄已暫存！
        </div>
    </div>

    <script>
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbwW7894_-Ji0gAj5DQJ--3aYC9ylCd7E4raXeF-mS8jTXZIQLB6f2V2YAOJzDBjDws/exec";

        const CATEGORY_REQUIREMENTS = {
            "共通性資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單"],
            "客製資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"],
            "套裝資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"],
            "工控系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"],
            "資通服務": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"],
            "預設全部": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"]
        };

        let bookings = [];
        let systemMapping = {};
        let activeBookingId = null;
        let currentSidebarFilter = 'all';

        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const elStatusText = document.getElementById('status-text');
        const elListCount = document.getElementById('list-count');
        const elBookingList = document.getElementById('booking-list');
        const elSearchInput = document.getElementById('search-input');
        const elSidebarFilterSelect = document.getElementById('sidebar-filter-select');
        const elSidebarFilterDateGroup = document.getElementById('sidebar-filter-date-group');

        const elWorkspaceEmpty = document.getElementById('workspace-empty');
        const elWorkspaceActive = document.getElementById('workspace-active');
        const elAside = document.querySelector('aside');
        
        const wsSystem = document.getElementById('ws-system');
        const wsDate = document.getElementById('ws-date');
        const wsTime = document.getElementById('ws-time');
        const wsUnit = document.getElementById('ws-unit');
        const wsContact = document.getElementById('ws-contact');
        const wsService = document.getElementById('ws-service');
        const wsStatus = document.getElementById('ws-status');
        const wsCategory = document.getElementById('ws-category');
        const wsDynamicActions = document.getElementById('ws-dynamic-actions');
        
        const btnSaveRecord = document.getElementById('btn-save-record');
        const saveIcon = document.getElementById('save-icon');
        const saveText = document.getElementById('save-text');

        async function fetchCloudData() {
            try {
                const response = await fetch(GOOGLE_API_URL, { redirect: "follow" });
                const text = await response.text();
                
                if (text.trim().startsWith('<')) {
                    throw new Error("API 權限遭拒，請至 Google Apps Script 檢查存取權限。");
                }
                
                const result = JSON.parse(text);
                
                if (result.status === 'success') {
                    bookings = result.bookings || [];
                    const fetchedUnits = result.units || [];
                    systemMapping = {};
                    
                    fetchedUnits.forEach(item => {
                        if (item.systemId) {
                            systemMapping[item.systemId] = {
                                systemName: item.systemName || '',
                                unit: item.unit || '',
                                contactPerson: item.contactPerson || '',
                                category: item.category || '',
                                folderUrl: item.folderUrl || ''
                            };
                        }
                    });
                    
                    elStatusText.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> <span class="text-emerald-600">已連線同步</span>`;
                    updateSidebarFilterOptions();
                    renderList(elSearchInput.value);
                }
            } catch (err) {
                console.error(err);
                elStatusText.innerHTML = `<span class="text-red-500">❌ 同步失敗</span>`;
                elBookingList.innerHTML = `<div class="p-4 text-center text-red-500 text-sm font-bold">無法載入預約名單</div>`;
            }
        }

        function updateSidebarFilterOptions() {
            const uniqueDates = [...new Set(bookings.map(b => b.date))].sort();
            if (currentSidebarFilter !== 'all' && currentSidebarFilter !== 'today' && currentSidebarFilter !== 'needs_review') {
                if (!uniqueDates.includes(currentSidebarFilter)) currentSidebarFilter = 'all'; 
            }
            let html = '';
            uniqueDates.forEach(d => html += `<option value="${d}">${d}</option>`);
            elSidebarFilterDateGroup.innerHTML = html;
            elSidebarFilterSelect.value = currentSidebarFilter;
        }

        function renderList(searchKw = '') {
            const todayStr = getTodayStr();

            let filtered = bookings.slice();
            if (currentSidebarFilter === 'today') {
                filtered = filtered.filter(b => b.date === todayStr);
            } else if (currentSidebarFilter === 'needs_review') {
                filtered = filtered.filter(b => String(b.needsReview).toLowerCase() === 'true');
            } else if (currentSidebarFilter !== 'all') {
                filtered = filtered.filter(b => b.date === currentSidebarFilter);
            }

            filtered.sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                const getSortWeight = (time) => {
                    if (time === '提前結案') return 3;
                    if (time === '隨同盤點') return 2;
                    return 1; 
                };
                const weightA = getSortWeight(a.time);
                const weightB = getSortWeight(b.time);
                if (weightA !== weightB) return weightA - weightB;
                return (a.time || "").localeCompare(b.time || "");
            });

            if (searchKw) {
                const kw = searchKw.toLowerCase();
                filtered = filtered.filter(b => {
                    const sysData = systemMapping[b.systemId] || {};
                    return b.systemId.toLowerCase().includes(kw) || 
                           (sysData.systemName && sysData.systemName.toLowerCase().includes(kw)) ||
                           (b.unit || '').toLowerCase().includes(kw) ||
                           (b.contactPerson || '').toLowerCase().includes(kw);
                });
            }

            elListCount.textContent = filtered.length;

            if (filtered.length === 0) {
                elBookingList.innerHTML = `<div class="p-4 text-center text-slate-400 text-sm">找不到相關預約</div>`;
                return;
            }

            elBookingList.innerHTML = filtered.map(b => {
                const isActive = b.id === activeBookingId;
                const sysData = systemMapping[b.systemId] || {};
                const sysName = sysData.systemName || '';
                
                let statusHtml = '';
                const isClosed = (b.followupStatus === '已訪談完成可用印' || b.followupStatus === '承辦人自行改完後可以用印');
                if (isClosed) {
                    statusHtml = `<span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700">已結案</span>`;
                } else if (b.followupStatus === '需要再次訪談') {
                    statusHtml = `<span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">再訪談</span>`;
                } else {
                    statusHtml = `<span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">未完成</span>`;
                }

                const needsReview = String(b.needsReview).toLowerCase() === 'true';
                const reviewBadge = needsReview ? `<span class="text-amber-500 ml-1.5 align-middle" title="待確認"><i data-lucide="star" class="w-3.5 h-3.5 inline fill-current"></i></span>` : '';
                
                return `
                    <div onclick="openWorkspace('${b.id}')" class="p-3 rounded-xl border transition-all cursor-pointer ${isActive ? 'bg-blue-50 border-blue-300 shadow-sm relative' : 'bg-white border-slate-100 hover:border-blue-200 hover:bg-slate-50'}">
                        ${isActive ? '<div class="absolute left-0 top-3 bottom-3 w-1 bg-blue-500 rounded-r-full"></div>' : ''}
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-sm ${isActive ? 'text-blue-800' : 'text-slate-700'} truncate pr-2">${b.systemId} ${sysName}${reviewBadge}</h3>
                            ${statusHtml}
                        </div>
                        <div class="text-[11px] text-slate-500 mb-2 flex items-center gap-2">
                            <span><i data-lucide="building-2" class="w-3 h-3 inline"></i> ${b.unit || '-'}</span>
                            <span><i data-lucide="user" class="w-3 h-3 inline"></i> ${b.contactPerson || '-'}</span>
                        </div>
                        <div class="flex justify-between items-center text-[10px] text-slate-400 font-medium mt-1 pt-2 border-t border-slate-100/70">
                            <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${b.date === todayStr ? '今日' : b.date}</span>
                            <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${['提前結案', '隨同盤點'].includes(b.time) ? b.time : b.time}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function openWorkspace(id) {
            activeBookingId = id;
            const b = bookings.find(x => x.id === id);
            if (!b) return;

            renderList(elSearchInput.value);

            const sysData = systemMapping[b.systemId] || {};
            wsSystem.textContent = `${b.systemId} ${sysData.systemName || ''}`;
            wsDate.textContent = b.date === getTodayStr() ? '今日' : b.date;
            wsTime.textContent = b.time;
            wsUnit.innerHTML = `<i data-lucide="building-2" class="w-3.5 h-3.5 inline text-slate-400"></i> ${b.unit || '-'}`;
            wsContact.innerHTML = `<i data-lucide="user" class="w-3.5 h-3.5 inline text-slate-400"></i> ${b.contactPerson || '-'}`;
            wsService.textContent = b.service || '無';
            
            let closedStatusHtml = '';
            const isClosed = (b.followupStatus === '已訪談完成可用印' || b.followupStatus === '承辦人自行改完後可以用印');
            if (isClosed) {
                wsStatus.className = "px-2 py-0.5 text-[10px] font-bold rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200";
                wsStatus.textContent = "已結案 (可印)";
            } else if (b.followupStatus === '需要再次訪談') {
                wsStatus.className = "px-2 py-0.5 text-[10px] font-bold rounded-full bg-blue-100 text-blue-700 border border-blue-200";
                wsStatus.textContent = "需再次訪談";
            } else {
                wsStatus.className = "px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-100 text-amber-700 border border-amber-200";
                wsStatus.textContent = "未完成";
            }

            const category = sysData.category || '';
            if (category) {
                wsCategory.textContent = category;
                wsCategory.classList.remove('hidden-el');
            } else {
                wsCategory.classList.add('hidden-el');
            }

            const needsReview = String(b.needsReview).toLowerCase() === 'true';
            const folderUrl = sysData.folderUrl || '';
            let actionsHtml = '';
            
            if (needsReview) {
                actionsHtml += `
                    <button onclick="toggleReviewStatus('${b.id}')" class="px-3 py-1 bg-amber-50 border border-amber-300 hover:bg-amber-100 text-amber-600 text-[11px] font-bold rounded-full flex items-center gap-1 shadow-sm transition-all cursor-pointer" title="取消標記">
                        <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i> 待確認
                    </button>
                `;
            } else {
                actionsHtml += `
                    <button onclick="toggleReviewStatus('${b.id}')" class="p-1 bg-white border border-slate-200 hover:bg-amber-50 hover:border-amber-300 text-slate-300 hover:text-amber-500 rounded-full flex items-center shadow-sm transition-all cursor-pointer" title="標記為待確認">
                        <i data-lucide="star" class="w-4 h-4"></i>
                    </button>
                `;
            }

            if (folderUrl && folderUrl !== "找不到對應資料夾") {
                actionsHtml += `
                    <a href="${folderUrl}" target="_blank" class="p-1 bg-white border border-slate-200 hover:bg-blue-50 hover:border-blue-300 text-slate-400 hover:text-blue-500 rounded-full flex items-center shadow-sm transition-all cursor-pointer" title="開啟雲端資料夾">
                        <i data-lucide="folder-open" class="w-4 h-4"></i>
                    </a>
                `;
            }
            wsDynamicActions.innerHTML = actionsHtml;

            let savedNotes = {};
            if (b.interviewNotes) {
                try { savedNotes = JSON.parse(b.interviewNotes); } catch(e) {}
            }

            let itemsToRender = category && CATEGORY_REQUIREMENTS[category] ? CATEGORY_REQUIREMENTS[category] : CATEGORY_REQUIREMENTS["預設全部"];
            const dynamicFormsContainer = document.getElementById('ws-dynamic-forms');
            
            if (dynamicFormsContainer) {
                dynamicFormsContainer.innerHTML = ''; 
                itemsToRender.forEach((item, index) => {
                    const contentId = `form-content-${index}`;
                    const badgeId = `form-badge-${index}`;
                    const savedText = savedNotes[item] || '';
                    const hasSavedData = savedText.trim().length > 0;
                    
                    const badgeHtml = hasSavedData 
                        ? `<span id="${badgeId}" class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700 transition-colors">📝 已紀錄</span>`
                        : `<span id="${badgeId}" class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-500 transition-colors">未填寫</span>`;

                    const formBlock = document.createElement('div');
                    formBlock.className = "bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm transition-all";
                    formBlock.innerHTML = `
                        <div class="flex justify-between items-center p-3 bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors" onclick="document.getElementById('${contentId}').classList.toggle('hidden-el');">
                            <div class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i> 
                                <span class="truncate">${item}</span>
                            </div>
                            ${badgeHtml}
                        </div>
                        <div id="${contentId}" class="hidden-el p-3 border-t border-slate-100 bg-white">
                            <textarea rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all custom-scrollbar" placeholder="請在此填寫 ${item} 相關紀錄..." oninput="
                                const badge = document.getElementById('${badgeId}');
                                if(this.value.trim().length > 0) {
                                    badge.innerHTML = '📝 已紀錄';
                                    badge.className = 'flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700 transition-colors';
                                } else {
                                    badge.innerHTML = '未填寫';
                                    badge.className = 'flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-500 transition-colors';
                                }
                                window.checkTextareasState();
                            ">${savedText}</textarea>
                        </div>
                    `;
                    dynamicFormsContainer.appendChild(formBlock);
                });
            }
            
            const elFollowupNotes = document.getElementById('ws-followup-notes');
            if (elFollowupNotes) elFollowupNotes.value = b.followupNotes || '';

            btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-md text-sm flex items-center gap-2';
            saveIcon.setAttribute('data-lucide', 'save');
            saveText.textContent = '儲存訪談紀錄';

            let hasCheckedRadio = false;
            document.querySelectorAll('input[name="followup-status"]').forEach(radio => {
                if (b.followupStatus && radio.value === b.followupStatus) {
                    radio.checked = true;
                    hasCheckedRadio = true;
                } else {
                    radio.checked = false;
                }
            });

            if (hasCheckedRadio) {
                document.querySelector('input[name="followup-status"]:checked').dispatchEvent(new Event('change')); 
            }

            window.checkTextareasState(); 

            elWorkspaceEmpty.classList.add('hidden-el');
            elWorkspaceActive.classList.remove('hidden-el');
            
            if (window.innerWidth < 768) {
                elAside.classList.add('-translate-x-full', 'absolute', 'h-full');
            }

            lucide.createIcons();
        }

        document.getElementById('btn-close-ws').addEventListener('click', () => {
            elAside.classList.remove('-translate-x-full', 'absolute');
            elWorkspaceActive.classList.add('hidden-el');
            elWorkspaceEmpty.classList.remove('hidden-el');
            activeBookingId = null;
            renderList(elSearchInput.value);
        });

        window.toggleReviewStatus = async function(id) {
            const bookingIndex = bookings.findIndex(b => b.id === id);
            if(bookingIndex === -1) return;

            const b = bookings[bookingIndex];
            const isCurrentlyNeedReview = String(b.needsReview).toLowerCase() === 'true';
            const newReviewStatus = isCurrentlyNeedReview ? 'false' : 'true';
            
            b.needsReview = newReviewStatus; 
            renderList(elSearchInput.value);
            if (activeBookingId === id) openWorkspace(id);

            if (GOOGLE_API_URL) {
                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'update_review_status', id: id, needsReview: newReviewStatus })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        showToast(newReviewStatus === 'true' ? '⭐ 已標記為待確認！' : '✅ 已取消確認狀態');
                    } else throw new Error();
                } catch (err) {
                    b.needsReview = isCurrentlyNeedReview ? 'true' : 'false';
                    renderList(elSearchInput.value);
                    if (activeBookingId === id) openWorkspace(id);
                    showToast('❌ 狀態同步失敗，請稍後再試', 'error');
                }
            }
        };

        elSearchInput.addEventListener('input', (e) => renderList(e.target.value));
        elSidebarFilterSelect.addEventListener('change', (e) => {
            currentSidebarFilter = e.target.value;
            renderList(elSearchInput.value);
        });

        window.checkTextareasState = function() {
            const textareas = document.querySelectorAll('#ws-dynamic-forms textarea');
            let hasValue = false;
            textareas.forEach(ta => { if (ta.value.trim().length > 0) hasValue = true; });

            const radioDone = document.getElementById('radio-status-done');
            const labelDone = document.getElementById('label-status-done');

            if (hasValue) {
                radioDone.disabled = true;
                labelDone.classList.add('opacity-40', 'cursor-not-allowed');
                labelDone.classList.remove('cursor-pointer');
                if (radioDone.checked) {
                    radioDone.checked = false;
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-md text-sm flex items-center gap-2';
                    saveIcon.setAttribute('data-lucide', 'save');
                    saveText.textContent = '儲存訪談紀錄';
                    wsStatus.textContent = '🟡 未完成';
                    wsStatus.className = 'px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-100 text-amber-700 border border-amber-200 transition-colors';
                    lucide.createIcons();
                }
            } else {
                radioDone.disabled = false;
                labelDone.classList.remove('opacity-40', 'cursor-not-allowed');
                labelDone.classList.add('cursor-pointer');
            }
        };

        document.querySelectorAll('input[name="followup-status"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === '已訪談完成可用印' || val === '承辦人自行改完後可以用印') {
                    saveText.textContent = '結案';
                    saveIcon.setAttribute('data-lucide', 'check-circle');
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-colors shadow-md text-sm flex items-center gap-2';
                } else if (val === '需要再次訪談') {
                    saveText.textContent = '儲存 (需再訪談)';
                    saveIcon.setAttribute('data-lucide', 'save');
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-md text-sm flex items-center gap-2';
                }
                lucide.createIcons();
            });
        });

        async function saveRecord() {
            if (!activeBookingId) return;
            const b = bookings.find(x => x.id === activeBookingId);
            if (!b) return;

            const originalText = saveText.textContent;
            saveText.textContent = '儲存中...';
            saveIcon.setAttribute('data-lucide', 'loader-2');
            saveIcon.classList.add('animate-spin');
            btnSaveRecord.disabled = true;
            lucide.createIcons();

            let savedNotes = {};
            const textareas = document.querySelectorAll('#ws-dynamic-forms textarea');
            textareas.forEach((ta, idx) => {
                const title = ta.previousElementSibling.querySelector('.truncate').textContent;
                savedNotes[title] = ta.value;
            });

            const selectedRadio = document.querySelector('input[name="followup-status"]:checked');
            const updateData = {
                id: activeBookingId,
                interviewNotes: JSON.stringify(savedNotes),
                followupStatus: selectedRadio ? selectedRadio.value : '',
                followupNotes: document.getElementById('ws-followup-notes').value.trim()
            };

            try {
                if (GOOGLE_API_URL) {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'update_interview', data: updateData })
                    });
                    const result = await response.json(); 
                    if (result.status !== 'success') throw new Error(result.message);
                }
                
                b.interviewNotes = updateData.interviewNotes;
                b.followupStatus = updateData.followupStatus;
                b.followupNotes = updateData.followupNotes;
                
                renderList(elSearchInput.value); 
                openWorkspace(activeBookingId);
                showToast('紀錄已成功儲存至雲端！', 'success');
            } catch (err) {
                showToast('儲存失敗，請檢查網路連線', 'error');
            } finally {
                saveText.textContent = originalText;
                saveIcon.setAttribute('data-lucide', 'save');
                saveIcon.classList.remove('animate-spin');
                btnSaveRecord.disabled = false;
                lucide.createIcons();
            }
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            const toastContent = toast.querySelector('div');
            toastContent.innerHTML = '';
            if (type === 'error') {
                toastContent.className = 'bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 text-white"></i> ${message}`;
            } else {
                toastContent.className = 'bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> ${message}`;
            }
            lucide.createIcons();
            toast.classList.remove('hidden-el');
            toastTimeout = setTimeout(() => toast.classList.add('hidden-el'), 3000);
        }

        lucide.createIcons();
        fetchCloudData();

    </script>
</body>
</html>
