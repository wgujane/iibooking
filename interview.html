<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 防護一：防止搜尋引擎收錄此內部系統 -->
    <meta name="robots" content="noindex, nofollow">
    <title>訪談設計與紀錄台 - 115年系統盤點</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hidden-el { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- 上方導覽列 -->
    <header class="bg-white border-b border-slate-200 shadow-sm z-10 flex-shrink-0">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-sm">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-slate-800">系統盤點 - 訪談設計與紀錄台</h1>
                    <p id="status-text" class="text-[11px] font-medium text-amber-500 flex items-center gap-1">🟡 資料同步中...</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- 搜尋框 -->
                <div class="relative hidden sm:block">
                    <input type="text" id="search-input" placeholder="搜尋系統 / 單位..." class="pl-9 pr-4 py-1.5 bg-slate-100 border-none rounded-full text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-[200px] transition-all">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-2"></i>
                </div>
                <button onclick="window.location.href='index.html'" class="text-sm font-bold text-slate-600 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 px-4 py-2 rounded-lg transition-colors border border-slate-200 flex items-center gap-2">
                    <i data-lucide="calendar" class="w-4 h-4"></i> 返回預約系統
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 (左右兩欄) -->
    <main class="flex-1 flex overflow-hidden max-w-[1400px] mx-auto w-full">
        
        <!-- 左側：系統清單 -->
        <aside class="w-full md:w-[350px] bg-white border-r border-slate-200 flex flex-col flex-shrink-0 relative z-0 transition-transform duration-300">
            <div class="p-3 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="list" class="w-4 h-4 text-indigo-500"></i> 已預約名單
                </h2>
                <span id="list-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            
            <!-- 日期篩選器 -->
            <div class="px-3 py-2 bg-white border-b border-slate-100 flex-shrink-0">
                <select id="sidebar-filter-select" class="w-full text-xs px-2.5 py-1.5 rounded-lg font-bold transition-all bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 cursor-pointer outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="all">顯示全部日期</option>
                    <option value="today">僅看今日</option>
                    <optgroup label="📅 依特定日期查看" id="sidebar-filter-date-group">
                        <!-- JS 動態產生 -->
                    </optgroup>
                </select>
            </div>
            
            <!-- 名單列表 -->
            <div id="booking-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 relative">
                <!-- 載入中骨架屏 / JS 產生 -->
                <div class="text-center text-slate-400 mt-10 text-sm flex flex-col items-center">
                    <i data-lucide="loader-2" class="w-6 h-6 animate-spin mb-2"></i>
                    載入中...
                </div>
            </div>
        </aside>

        <!-- 右側：未選擇任何項目時的空畫面 -->
        <section id="workspace-empty" class="flex-1 bg-slate-50 flex flex-col items-center justify-center text-slate-400 z-10">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center max-w-sm">
                <div class="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="mouse-pointer-click" class="w-8 h-8 text-indigo-400"></i>
                </div>
                <h3 class="font-bold text-slate-700 text-lg mb-2">準備好開始訪談了嗎？</h3>
                <p class="text-sm">請從左側名單選擇一個系統，即可展開訪談設計與紀錄工作區。</p>
            </div>
        </section>

        <!-- 右側：選擇系統後展開的詳細畫面 -->
        <section id="workspace-active" class="flex-1 bg-slate-50 flex flex-col hidden-el overflow-hidden relative z-10 h-full">
            
            <!-- 標頭資訊 -->
            <div class="bg-white border-b border-slate-200 p-6 flex-shrink-0 shadow-sm z-20">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="flex items-center gap-2 mb-1.5">
                            <span id="ws-status" class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-100 text-amber-700 border border-amber-200">未完成</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-3">
                            <h2 id="ws-system" class="text-2xl font-black text-slate-800">系統名稱</h2>
                            <span id="ws-category" class="px-2.5 py-1 text-xs font-bold rounded-lg bg-indigo-50 text-indigo-700 border border-indigo-200 shadow-sm hidden-el">分類</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div id="ws-date" class="font-bold text-indigo-600 text-lg">2026-04-10</div>
                        <div id="ws-time" class="text-sm font-bold text-slate-500">14:00</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">負責單位</div>
                        <div id="ws-unit" class="text-sm font-bold text-slate-700"><i data-lucide="building-2" class="w-3.5 h-3.5 inline text-slate-400"></i> 資訊處</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">承辦人</div>
                        <div id="ws-contact" class="text-sm font-bold text-slate-700"><i data-lucide="user" class="w-3.5 h-3.5 inline text-slate-400"></i> 王大明</div>
                    </div>
                    <div class="md:col-span-2">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">預約備註</div>
                        <div id="ws-service" class="text-sm text-slate-600 truncate" title="無">無</div>
                    </div>
                </div>
            </div>

            <!-- 捲動編輯區 -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
                <div class="max-w-4xl mx-auto space-y-6">
                    
                    <!-- 區塊 1：訪談紀錄 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in">
                        <div class="bg-emerald-50/50 p-3 border-b border-slate-100 flex items-center gap-2">
                            <i data-lucide="mic" class="w-5 h-5 text-emerald-600"></i>
                            <h3 class="font-bold text-emerald-900">一、訪談紀錄 <span class="text-xs text-emerald-700 font-normal ml-2">(點擊展開表單填寫)</span></h3>
                        </div>
                        <div class="p-5">
                            <div id="ws-dynamic-forms" class="space-y-2">
                                <!-- JS 動態產生折疊式表單輸入框 -->
                            </div>
                            <div class="text-[11px] text-slate-500 mt-4 bg-slate-100/80 p-2.5 rounded border border-slate-200">
                                💡 <strong>備註：</strong>保密同意書及保密切結書等2項，如因契約已終止、境外廠商或非特定供應商(如臉書、LINE社群等)致無法提供前2項者，可註記後免填寫。
                            </div>
                        </div>
                    </div>

                    <!-- 區塊 2：後續追蹤 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in" style="animation-delay: 0.1s;">
                        <div class="bg-amber-50/50 p-3 border-b border-slate-100 flex items-center gap-2">
                            <i data-lucide="list-todo" class="w-5 h-5 text-amber-600"></i>
                            <h3 class="font-bold text-amber-900">二、待辦與後續追蹤</h3>
                        </div>
                        <div class="p-5 space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-2">結案狀態判定</label>
                                <div class="flex flex-col gap-3">
                                    <label id="label-status-done" class="flex items-center gap-2 cursor-pointer transition-opacity">
                                        <input type="radio" id="radio-status-done" name="followup-status" value="已訪談完成可用印" class="w-4 h-4 text-emerald-500 focus:ring-emerald-500 border-slate-300 disabled:cursor-not-allowed">
                                        <span class="text-sm font-medium text-slate-700">已訪談完成可用印</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="followup-status" value="承辦人自行改完後可以用印" class="w-4 h-4 text-emerald-500 focus:ring-emerald-500 border-slate-300">
                                        <span class="text-sm font-medium text-slate-700">承辦人自行改完後可以用印</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="followup-status" value="需要再次訪談" class="w-4 h-4 text-blue-500 focus:ring-blue-500 border-slate-300">
                                        <span class="text-sm font-medium text-slate-700">需要再次訪談</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">後續追蹤事項說明</label>
                                <!-- ✅ 新增 ID 供儲存時讀取 -->
                                <textarea id="ws-followup-notes" rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 focus:bg-white outline-none transition-all" placeholder="例如：承辦人需於下週五前補件架構圖。"></textarea>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            <!-- 底部儲存按鈕區 -->
            <div class="bg-white border-t border-slate-200 p-4 flex justify-between items-center z-20 flex-shrink-0">
                <button id="btn-close-ws" class="md:hidden text-slate-500 font-bold text-sm px-4 py-2 bg-slate-100 rounded-lg">
                    返回清單
                </button>
                <div class="hidden md:block text-xs text-slate-400 font-bold">
                    <i data-lucide="cloud-upload" class="w-3 h-3 inline"></i> 紀錄將會即時同步至雲端試算表。
                </div>
                <div class="flex gap-2">
                    <button id="btn-save-record" onclick="saveRecord()" class="px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md text-sm flex items-center gap-2">
                        <i id="save-icon" data-lucide="save" class="w-4 h-4"></i> <span id="save-text">儲存訪談紀錄</span>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed top-20 right-6 z-50 hidden-el animate-fade-in">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm">
            <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> 紀錄已暫存！
        </div>
    </div>

    <script>
        // ⚠️ 請使用和 index.html 一模一樣的 API 網址
        const GOOGLE_API_URL = "https://script.google.com/macros/library/d/1ofckFrXkAV7_KouTksH3eeoBGP_ntTmmJNBD-EsL6r_VBjvUyHyE3fZ1/8";

        // ✅ 矩陣判斷表
        const CATEGORY_REQUIREMENTS = {
            "共通性資通系統": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單"
            ],
            "客製資通系統": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"
            ],
            "套裝資通系統": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"
            ],
            "工控系統": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"
            ],
            "資通服務": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"
            ],
            "預設全部": [
                "ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"
            ]
        };

        let bookings = [];
        let systemMapping = {};
        let activeBookingId = null;
        let currentSidebarFilter = 'all';

        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // DOM Elements
        const elStatusText = document.getElementById('status-text');
        const elListCount = document.getElementById('list-count');
        const elBookingList = document.getElementById('booking-list');
        const elSearchInput = document.getElementById('search-input');
        const elSidebarFilterSelect = document.getElementById('sidebar-filter-select');
        const elSidebarFilterDateGroup = document.getElementById('sidebar-filter-date-group');

        const elWorkspaceEmpty = document.getElementById('workspace-empty');
        const elWorkspaceActive = document.getElementById('workspace-active');
        const elAside = document.querySelector('aside');
        
        // Workspace Elements
        const wsSystem = document.getElementById('ws-system');
        const wsDate = document.getElementById('ws-date');
        const wsTime = document.getElementById('ws-time');
        const wsUnit = document.getElementById('ws-unit');
        const wsContact = document.getElementById('ws-contact');
        const wsService = document.getElementById('ws-service');
        const wsStatus = document.getElementById('ws-status');
        const wsCategory = document.getElementById('ws-category');
        
        // 取得儲存按鈕相關元素
        const btnSaveRecord = document.getElementById('btn-save-record');
        const saveIcon = document.getElementById('save-icon');
        const saveText = document.getElementById('save-text');

        async function fetchCloudData() {
            try {
                const response = await fetch(GOOGLE_API_URL, { redirect: "follow" });
                const text = await response.text();
                const result = JSON.parse(text);
                
                if (result.status === 'success') {
                    bookings = result.bookings || [];
                    
                    const fetchedUnits = result.units || [];
                    systemMapping = {};
                    
                    if (Array.isArray(fetchedUnits)) {
                        fetchedUnits.forEach(item => {
                            if (item.system) {
                                systemMapping[item.system] = {
                                    unit: item.unit || '',
                                    contactPerson: item.contactPerson || '',
                                    category: item.category || ''
                                };
                            }
                        });
                    } else {
                        Object.keys(fetchedUnits).forEach(key => {
                            if (key !== 'system') {
                                systemMapping[key] = {
                                    unit: fetchedUnits[key].system || '',
                                    contactPerson: fetchedUnits[key].contactPerson || '',
                                    category: fetchedUnits[key].category || ''
                                };
                            }
                        });
                    }
                    
                    elStatusText.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> <span class="text-emerald-600">資料已同步</span>`;
                    updateSidebarFilterOptions();
                    renderList(elSearchInput.value);
                }
            } catch (err) {
                console.error(err);
                elStatusText.innerHTML = `<span class="text-red-500">❌ 同步失敗</span>`;
                elBookingList.innerHTML = `<div class="p-4 text-center text-red-500 text-sm font-bold">無法載入預約名單</div>`;
            }
        }

        function updateSidebarFilterOptions() {
            const uniqueDates = [...new Set(bookings.map(b => b.date))].sort();
            
            if (currentSidebarFilter !== 'all' && currentSidebarFilter !== 'today') {
                if (!uniqueDates.includes(currentSidebarFilter)) {
                    currentSidebarFilter = 'all'; 
                }
            }

            let html = '';
            uniqueDates.forEach(d => {
                html += `<option value="${d}">${d}</option>`;
            });
            elSidebarFilterDateGroup.innerHTML = html;
            elSidebarFilterSelect.value = currentSidebarFilter;
        }

        function renderList(searchKw = '') {
            const todayStr = getTodayStr();

            let filtered = bookings.slice();
            if (currentSidebarFilter === 'today') {
                filtered = filtered.filter(b => b.date === todayStr);
            } else if (currentSidebarFilter !== 'all') {
                filtered = filtered.filter(b => b.date === currentSidebarFilter);
            }

            filtered.sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                
                const getSortWeight = (time) => {
                    if (time === '提前結案') return 3;
                    if (time === '隨同盤點') return 2;
                    return 1; 
                };
                const weightA = getSortWeight(a.time);
                const weightB = getSortWeight(b.time);
                if (weightA !== weightB) return weightA - weightB;
                
                return (a.time || "").localeCompare(b.time || "");
            });

            if (searchKw) {
                const kw = searchKw.toLowerCase();
                filtered = filtered.filter(b => 
                    b.system.toLowerCase().includes(kw) || 
                    (b.unit || '').toLowerCase().includes(kw) ||
                    (b.contactPerson || '').toLowerCase().includes(kw)
                );
            }

            elListCount.textContent = filtered.length;

            if (filtered.length === 0) {
                elBookingList.innerHTML = `<div class="p-4 text-center text-slate-400 text-sm">找不到相關預約</div>`;
                return;
            }

            elBookingList.innerHTML = filtered.map(b => {
                const isCompleted = (b.completed === 'true' || b.completed === true);
                const isActive = b.id === activeBookingId;
                
                return `
                    <div onclick="openWorkspace('${b.id}')" class="p-3 rounded-xl border transition-all cursor-pointer ${isActive ? 'bg-indigo-50 border-indigo-300 shadow-sm relative' : 'bg-white border-slate-100 hover:border-indigo-200 hover:bg-slate-50'}">
                        ${isActive ? '<div class="absolute left-0 top-3 bottom-3 w-1 bg-indigo-500 rounded-r-full"></div>' : ''}
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-sm ${isActive ? 'text-indigo-800' : 'text-slate-700'} truncate pr-2">${b.system}</h3>
                            <span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded ${isCompleted ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">
                                ${isCompleted ? '已結案' : '未完成'}
                            </span>
                        </div>
                        <div class="text-[11px] text-slate-500 mb-2 flex items-center gap-2">
                            <span><i data-lucide="building-2" class="w-3 h-3 inline"></i> ${b.unit || '-'}</span>
                            <span><i data-lucide="user" class="w-3 h-3 inline"></i> ${b.contactPerson || '-'}</span>
                        </div>
                        <div class="flex items-center gap-1.5 text-[11px] font-bold ${isActive ? 'text-indigo-600' : 'text-slate-400'}">
                            <i data-lucide="calendar-clock" class="w-3.5 h-3.5"></i> ${b.date === todayStr ? '今日' : b.date} 
                            ${['提前結案', '隨同盤點'].includes(b.time) ? `<span class="bg-slate-200 text-slate-600 px-1 rounded ml-1">${b.time}</span>` : b.time}
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function openWorkspace(id) {
            activeBookingId = id;
            const b = bookings.find(x => x.id === id);
            if (!b) return;

            renderList(elSearchInput.value);

            wsSystem.textContent = b.system;
            wsDate.textContent = b.date === getTodayStr() ? '今日' : b.date;
            wsTime.textContent = b.time;
            wsUnit.innerHTML = `<i data-lucide="building-2" class="w-3.5 h-3.5 inline text-slate-400"></i> ${b.unit || '-'}`;
            wsContact.innerHTML = `<i data-lucide="user" class="w-3.5 h-3.5 inline text-slate-400"></i> ${b.contactPerson || '-'}`;
            wsService.textContent = b.service || '無';
            wsService.title = b.service || '無';

            // 設定初始標籤狀態
            const isCompleted = (b.completed === 'true' || b.completed === true);
            wsStatus.textContent = isCompleted ? '✅ 已結案' : '🟡 未完成';
            wsStatus.className = `px-2 py-0.5 text-[10px] font-bold rounded-full border ${isCompleted ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-amber-50 text-amber-600 border-amber-200'}`;

            const category = systemMapping[b.system]?.category || '';
            if (category) {
                wsCategory.textContent = category;
                wsCategory.classList.remove('hidden-el');
            } else {
                wsCategory.classList.add('hidden-el');
            }

            // ✅ 解析既有的訪談紀錄 (從後端 JSON 字串解析回物件)
            let savedNotes = {};
            if (b.interviewNotes) {
                try { savedNotes = JSON.parse(b.interviewNotes); } catch(e) { console.error('解析紀錄失敗', e); }
            }

            // 根據分類帶入專屬表單，並以折疊面板呈現
            let itemsToRender = [];
            if (category && CATEGORY_REQUIREMENTS[category]) {
                itemsToRender = CATEGORY_REQUIREMENTS[category];
            } else {
                itemsToRender = CATEGORY_REQUIREMENTS["預設全部"];
            }
            
            const dynamicFormsContainer = document.getElementById('ws-dynamic-forms');
            if (dynamicFormsContainer) {
                dynamicFormsContainer.innerHTML = ''; // 清空前一個系統的表單
                
                itemsToRender.forEach((item, index) => {
                    const contentId = `form-content-${index}`;
                    const badgeId = `form-badge-${index}`;
                    
                    // 填入既有資料
                    const savedText = savedNotes[item] || '';
                    const hasSavedData = savedText.trim().length > 0;
                    
                    const badgeHtml = hasSavedData 
                        ? `<span id="${badgeId}" class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-indigo-100 text-indigo-700 transition-colors">📝 已紀錄</span>`
                        : `<span id="${badgeId}" class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-500 transition-colors">未填寫</span>`;

                    const formBlock = document.createElement('div');
                    formBlock.className = "bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm transition-all";
                    formBlock.innerHTML = `
                        <div class="flex justify-between items-center p-3 bg-slate-50 hover:bg-slate-100 cursor-pointer transition-colors" onclick="document.getElementById('${contentId}').classList.toggle('hidden-el');">
                            <div class="text-sm font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i> 
                                <span class="truncate">${item}</span>
                            </div>
                            ${badgeHtml}
                        </div>
                        <div id="${contentId}" class="hidden-el p-3 border-t border-slate-100 bg-white">
                            <textarea rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-md text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all custom-scrollbar" placeholder="請在此填寫 ${item} 相關紀錄..." oninput="
                                const badge = document.getElementById('${badgeId}');
                                if(this.value.trim().length > 0) {
                                    badge.innerHTML = '📝 已紀錄';
                                    badge.className = 'flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-indigo-100 text-indigo-700 transition-colors';
                                } else {
                                    badge.innerHTML = '未填寫';
                                    badge.className = 'flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-500 transition-colors';
                                }
                                window.checkTextareasState();
                            ">${savedText}</textarea>
                        </div>
                    `;
                    dynamicFormsContainer.appendChild(formBlock);
                });
            }
            
            // ✅ 讀取後續追蹤與狀態
            const elFollowupNotes = document.getElementById('ws-followup-notes');
            if (elFollowupNotes) elFollowupNotes.value = b.followupNotes || '';

            // 初始化按鈕
            btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md text-sm flex items-center gap-2';
            saveIcon.setAttribute('data-lucide', 'save');
            saveText.textContent = '儲存訪談紀錄';

            let hasCheckedRadio = false;
            document.querySelectorAll('input[name="followup-status"]').forEach(radio => {
                if (b.followupStatus && radio.value === b.followupStatus) {
                    radio.checked = true;
                    hasCheckedRadio = true;
                } else {
                    radio.checked = false;
                }
            });

            if (hasCheckedRadio) {
                const checkedRadio = document.querySelector('input[name="followup-status"]:checked');
                checkedRadio.dispatchEvent(new Event('change')); // 觸發連動UI
            }

            window.checkTextareasState(); // 確保載入新系統時狀態防呆計算正確

            // 切換視圖
            elWorkspaceEmpty.classList.add('hidden-el');
            elWorkspaceActive.classList.remove('hidden-el');
            
            if (window.innerWidth < 768) {
                elAside.classList.add('-translate-x-full', 'absolute', 'h-full');
            }

            lucide.createIcons();
        }

        // 手機版：返回清單
        document.getElementById('btn-close-ws').addEventListener('click', () => {
            elAside.classList.remove('-translate-x-full', 'absolute');
            elWorkspaceActive.classList.add('hidden-el');
            elWorkspaceEmpty.classList.remove('hidden-el');
            activeBookingId = null;
            renderList(elSearchInput.value);
        });

        // 搜尋功能
        elSearchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // 日期過濾功能
        elSidebarFilterSelect.addEventListener('change', (e) => {
            currentSidebarFilter = e.target.value;
            renderList(elSearchInput.value);
        });

        // 檢查所有動態文字框是否有值，並連動防呆禁用選項
        window.checkTextareasState = function() {
            const textareas = document.querySelectorAll('#ws-dynamic-forms textarea');
            let hasValue = false;
            textareas.forEach(ta => {
                if (ta.value.trim().length > 0) hasValue = true;
            });

            const radioDone = document.getElementById('radio-status-done');
            const labelDone = document.getElementById('label-status-done');

            if (hasValue) {
                radioDone.disabled = true;
                labelDone.classList.add('opacity-40', 'cursor-not-allowed');
                labelDone.classList.remove('cursor-pointer');
                
                if (radioDone.checked) {
                    radioDone.checked = false;
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md text-sm flex items-center gap-2';
                    saveIcon.setAttribute('data-lucide', 'save');
                    saveText.textContent = '儲存訪談紀錄';
                    
                    wsStatus.textContent = '🟡 未完成';
                    wsStatus.className = 'px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-100 text-amber-700 border border-amber-200 transition-colors';
                    lucide.createIcons();
                }
            } else {
                radioDone.disabled = false;
                labelDone.classList.remove('opacity-40', 'cursor-not-allowed');
                labelDone.classList.add('cursor-pointer');
            }
        };

        // 狀態判定改變時，連動更改按鈕與標籤狀態
        document.querySelectorAll('input[name="followup-status"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const val = e.target.value;
                
                if (val === '已訪談完成可用印' || val === '承辦人自行改完後可以用印') {
                    saveText.textContent = '結案';
                    saveIcon.setAttribute('data-lucide', 'check-circle');
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-colors shadow-md text-sm flex items-center gap-2';
                    
                    wsStatus.textContent = '✅ 可結案';
                    wsStatus.className = 'px-2 py-0.5 text-[10px] font-bold rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200 transition-colors';
                } else if (val === '需要再次訪談') {
                    saveText.textContent = '儲存訪談紀錄';
                    saveIcon.setAttribute('data-lucide', 'save');
                    btnSaveRecord.className = 'px-6 py-2.5 rounded-lg font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-md text-sm flex items-center gap-2';
                    
                    wsStatus.textContent = '🔄 再訪談';
                    wsStatus.className = 'px-2 py-0.5 text-[10px] font-bold rounded-full bg-blue-100 text-blue-700 border border-blue-200 transition-colors';
                }
                lucide.createIcons();
            });
        });

        // ✅ 真正的儲存函式
        async function saveRecord() {
            if (!activeBookingId) return;

            // 1. 蒐集表單內容打包成 JSON 字串
            const notesObj = {};
            const formBlocks = document.querySelectorAll('#ws-dynamic-forms > div');
            formBlocks.forEach(block => {
                const titleEl = block.querySelector('.truncate');
                const textarea = block.querySelector('textarea');
                if (titleEl && textarea && textarea.value.trim() !== '') {
                    notesObj[titleEl.textContent.trim()] = textarea.value.trim();
                }
            });

            // 2. 蒐集狀態與追蹤事項
            const selectedRadio = document.querySelector('input[name="followup-status"]:checked');
            const followupStatus = selectedRadio ? selectedRadio.value : '';
            const followupNotes = document.getElementById('ws-followup-notes').value.trim();

            const updateData = {
                id: activeBookingId,
                interviewNotes: JSON.stringify(notesObj),
                followupStatus: followupStatus,
                followupNotes: followupNotes
            };

            // 3. UI 變更為讀取中
            const originalText = saveText.textContent;
            const originalIcon = saveIcon.getAttribute('data-lucide');
            saveText.textContent = '儲存中...';
            saveIcon.setAttribute('data-lucide', 'loader-2');
            saveIcon.classList.add('animate-spin');
            btnSaveRecord.disabled = true;

            try {
                // 發送給 Google Apps Script
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'update_interview', data: updateData })
                });
                
                // 即時更新本地端資料 (這樣不用重新整理就能看到最新狀態)
                const bIndex = bookings.findIndex(x => x.id === activeBookingId);
                if (bIndex > -1) {
                    bookings[bIndex].interviewNotes = updateData.interviewNotes;
                    bookings[bIndex].followupStatus = updateData.followupStatus;
                    bookings[bIndex].followupNotes = updateData.followupNotes;
                    
                    if (followupStatus === '已訪談完成可用印' || followupStatus === '承辦人自行改完後可以用印') {
                        bookings[bIndex].completed = 'true';
                    } else if (followupStatus === '需要再次訪談') {
                        bookings[bIndex].completed = 'false';
                    }
                    renderList(elSearchInput.value); 
                }

                showToast('紀錄已成功儲存至雲端！', 'success');
            } catch (err) {
                showToast('儲存失敗，請檢查網路連線', 'error');
            } finally {
                // 還原按鈕
                saveText.textContent = originalText;
                saveIcon.setAttribute('data-lucide', originalIcon);
                saveIcon.classList.remove('animate-spin');
                btnSaveRecord.disabled = false;
                lucide.createIcons();
            }
        }

        // 顯示通知
        let toastTimeout;
        function showToast(message, type = 'success') {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            const toastContent = toast.querySelector('div');
            
            toastContent.innerHTML = '';
            
            if (type === 'error') {
                toastContent.className = 'bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 text-white"></i> ${message}`;
            } else {
                toastContent.className = 'bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> ${message}`;
            }
            
            lucide.createIcons();
            toast.classList.remove('hidden-el');
            
            toastTimeout = setTimeout(() => {
                toast.classList.add('hidden-el');
            }, 3000);
        }

        // 啟動
        lucide.createIcons();
        fetchCloudData();

    </script>
</body>
</html>
