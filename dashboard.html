<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>回收統計儀表板 - 115年系統盤點</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        
        .hidden-el { display: none !important; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50 flex-shrink-0">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-1.5 rounded-lg">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <h1 class="font-black text-lg text-slate-800 tracking-wide">115年系統盤點 <span class="hidden sm:inline text-slate-400 font-normal text-sm ml-1">| 回收統計</span></h1>
            </div>
            
            <div class="flex gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200">
                <a href="index.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-200 transition-all">
                    <i data-lucide="calendar" class="w-4 h-4"></i> <span class="hidden sm:inline">預約清單</span>
                </a>
                <a href="interview.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-200 transition-all">
                    <i data-lucide="mic" class="w-4 h-4"></i> <span class="hidden sm:inline">訪談紀錄</span>
                </a>
                <a href="dashboard.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-bold bg-white text-blue-600 shadow-sm cursor-default pointer-events-none">
                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i> <span class="hidden sm:inline">回收統計</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-[1400px] mx-auto p-4 md:p-8 space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-fade-in">
            <div>
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="pie-chart" class="text-indigo-600 w-6 h-6"></i> 系統盤點與表單回收進度
                </h2>
                <p id="status-text" class="text-sm mt-1 font-medium text-amber-500 flex items-center gap-1">
                    🟡 資料載入與計算中...
                </p>
            </div>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <button onclick="exportUnsubmitted()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold border border-amber-600 hover:bg-amber-600 transition-all shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> 匯出未繳回清單
                </button>
                <button id="btn-sync" onclick="fetchCloudData()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold border border-indigo-100 hover:bg-indigo-100 transition-all shadow-sm">
                    <i data-lucide="refresh-cw" id="sync-icon" class="w-4 h-4"></i> 重新計算與同步
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 animate-fade-in" style="animation-delay: 0.1s;">
            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex flex-col justify-between">
                <div class="flex justify-between items-start mb-2">
                    <div class="text-sm font-bold text-slate-500">總預約系統數</div>
                    <div class="p-1.5 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="monitor" class="w-4 h-4"></i></div>
                </div>
                <div class="text-3xl font-black text-slate-800" id="kpi-total-systems">0</div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex flex-col justify-between">
                <div class="flex justify-between items-start mb-2">
                    <div class="text-sm font-bold text-slate-500">已結案系統 (電子檔)</div>
                    <div class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg"><i data-lucide="check-circle" class="w-4 h-4"></i></div>
                </div>
                <div class="flex items-baseline gap-2">
                    <div class="text-3xl font-black text-emerald-600" id="kpi-closed-systems">0</div>
                    <div class="text-sm font-bold text-slate-400" id="kpi-closed-rate">0%</div>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="bar-closed-systems" class="bg-emerald-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex flex-col justify-between">
                <div class="flex justify-between items-start mb-2">
                    <div class="text-sm font-bold text-slate-500">應收表單總數</div>
                    <div class="p-1.5 bg-amber-50 text-amber-600 rounded-lg"><i data-lucide="file-stack" class="w-4 h-4"></i></div>
                </div>
                <div class="text-3xl font-black text-slate-800" id="kpi-total-docs">0</div>
                <div class="text-xs text-slate-400 mt-2 font-medium">依據各系統分類自動計算</div>
            </div>
            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex flex-col justify-between relative overflow-hidden border-b-4 border-b-indigo-500">
                <div class="absolute -right-4 -bottom-4 opacity-5"><i data-lucide="inbox" class="w-32 h-32 text-indigo-600"></i></div>
                <div class="flex justify-between items-start mb-2 relative z-10">
                    <div class="text-sm font-bold text-slate-500">已收回紙本歸檔</div>
                    <div class="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg"><i data-lucide="inbox" class="w-4 h-4"></i></div>
                </div>
                <div class="flex items-baseline gap-2 relative z-10">
                    <div class="text-3xl font-black text-indigo-600" id="kpi-recovered-systems">0</div>
                    <div class="text-sm font-bold text-slate-400" id="kpi-recovered-rate">0%</div>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden relative z-10">
                    <div id="bar-recovered-systems" class="bg-indigo-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden animate-fade-in" style="animation-delay: 0.2s;">
            <div class="p-4 sm:p-5 border-b border-slate-100 bg-slate-50/50 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                <div class="flex items-center gap-2">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="table-properties" class="w-5 h-5 text-blue-600"></i> 各系統追蹤明細表
                    </h3>
                    <div class="text-xs text-slate-500 font-bold hidden xl:block ml-2">💡 點擊標題即可進行排序，點擊備註可記錄狀況！</div>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                    <select id="dashboard-filter" onchange="calculateAndRender()" class="w-full sm:w-auto px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm font-bold text-slate-600 cursor-pointer">
                        <option value="all">顯示全部狀態</option>
                        <option value="unsubmitted">⚠️ 僅顯示未繳回</option>
                        <option value="submitted">✅ 僅顯示已繳回</option>
                        <option value="needs_review">⭐ 僅顯示需二次確認</option>
                    </select>
                    
                    <div class="relative w-full sm:w-72 flex-shrink-0">
                        <input type="text" id="dashboard-search" placeholder="搜尋系統 / 編號 / 承辦人..." class="w-full pl-9 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-2.5"></i>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white border-b border-slate-100 text-slate-400 font-bold uppercase text-[10px] tracking-widest select-none">
                        <tr>
                            <!-- 加入點擊排序的樣式 -->
                            <th class="p-4 whitespace-nowrap cursor-pointer group hover:bg-slate-50 transition-colors" onclick="handleSort('system')">
                                <div class="flex items-center gap-1">
                                    系統資訊 
                                    <span id="sort-icon-system" class="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="arrow-up-down" class="w-3 h-3"></i></span>
                                </div>
                            </th>
                            <th class="p-4 whitespace-nowrap cursor-pointer group hover:bg-slate-50 transition-colors" onclick="handleSort('unit')">
                                <div class="flex items-center gap-1">
                                    單位 / 承辦人 
                                    <span id="sort-icon-unit" class="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="arrow-up-down" class="w-3 h-3"></i></span>
                                </div>
                            </th>
                            <th class="p-4 whitespace-nowrap">結案狀態 (電子檔)</th>
                            <th class="p-4 whitespace-nowrap text-center">二次確認 (顧問用)</th>
                            <th class="p-4 whitespace-nowrap cursor-pointer group hover:bg-slate-50 transition-colors" onclick="handleSort('isSubmitted')">
                                <div class="flex items-center gap-1">
                                    紙本繳回狀態 
                                    <span id="sort-icon-isSubmitted" class="text-indigo-500"><i data-lucide="arrow-up" class="w-3 h-3"></i></span>
                                </div>
                            </th>
                            <th class="p-4 whitespace-nowrap w-48">管理端備註 (點擊修改)</th>
                        </tr>
                    </thead>
                    <tbody id="dashboard-tbody">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-slate-400">
                                <i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> 資料計算中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <div id="note-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden-el flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2"><i data-lucide="edit-3" class="w-5 h-5 text-indigo-600"></i> 編輯系統備註</h3>
                <button onclick="closeNoteModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <div id="note-modal-system" class="text-sm font-bold text-indigo-700 mb-2">系統名稱</div>
                    <textarea id="note-modal-input" rows="4" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all custom-scrollbar" placeholder="請輸入備註事項 (例如：紙本缺漏附件、待主管簽核...)"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeNoteModal()" class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-200 rounded-lg transition-colors">取消</button>
                <button onclick="saveDashboardNote()" id="btn-save-note" class="px-5 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm flex items-center gap-2">
                    <i data-lucide="save" id="icon-save-note" class="w-4 h-4"></i> <span>儲存備註</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-20 right-6 z-50 hidden-el animate-fade-in">
        <div id="toast-content" class="px-6 py-3 rounded-xl shadow-xl text-white text-sm font-bold flex items-center gap-2 bg-slate-800">
            <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> <span id="toast-msg"></span>
        </div>
    </div>

    <script>
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbwW7894_-Ji0gAj5DQJ--3aYC9ylCd7E4raXeF-mS8jTXZIQLB6f2V2YAOJzDBjDws/exec";

        const CATEGORY_REQUIREMENTS = {
            "共通性資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單"],
            "客製資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"],
            "套裝資通系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"],
            "工控系統": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"],
            "資通服務": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-04資訊資產清冊", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書"],
            "預設全部": ["ISMS-B-01-03外部單位聯絡清單", "ISMS-B-03-01關注方清單", "ISMS-B-04-02資通系統安全等級評估表", "ISMS-B-04-03資通系統防護基準表", "ISMS-B-04-04資訊資產清冊", "ISMS-B-08-05備份計畫表", "ISMS-B-08-06備份回復測試紀錄表", "ISMS-B-10-01帳號權限審查紀錄單", "ISMS-B-12-01保密同意書", "ISMS-B-12-02保密切結書", "ISMS-B-14-01業務流程衝擊分析表"]
        };

        let bookings = [];
        let systemMapping = {};
        
        // 排序全域變數設定
        let currentSortKey = 'isSubmitted'; // 預設依據紙本繳回狀態排序
        let currentSortDir = 'asc';         // 預設正序

        async function fetchCloudData() {
            const syncIcon = document.getElementById('sync-icon');
            const statusText = document.getElementById('status-text');
            
            syncIcon.classList.add('animate-spin');
            statusText.innerHTML = `🟡 資料載入與計算中...`;

            try {
                const response = await fetch(GOOGLE_API_URL, { redirect: "follow" });
                const text = await response.text();
                
                if (text.trim().startsWith('<')) {
                    throw new Error("API 權限遭拒，請至 Google Apps Script 檢查存取權限。");
                }
                
                const result = JSON.parse(text);
                
                if (result.status === 'success') {
                    bookings = result.bookings || [];
                    const fetchedUnits = result.units || [];
                    systemMapping = {};
                    
                    fetchedUnits.forEach(item => {
                        if (item.systemId) {
                            systemMapping[item.systemId] = {
                                systemName: item.systemName || '',
                                unit: item.unit || '',
                                contactPerson: item.contactPerson || '',
                                category: item.category || ''
                            };
                        }
                    });
                    
                    statusText.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full"></span> <span class="text-emerald-600">最後更新：${new Date().toLocaleTimeString('zh-TW')}</span>`;
                    calculateAndRender();
                } else {
                    throw new Error(result.message || "雲端讀取錯誤");
                }
            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span class="text-red-500">❌ 同步失敗 (${err.message})</span>`;
            } finally {
                syncIcon.classList.remove('animate-spin');
            }
        }

        // 點擊表頭排序函式
        window.handleSort = function(key) {
            if (currentSortKey === key) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortKey = key;
                currentSortDir = 'asc';
            }
            calculateAndRender();
        };

        window.toggleCompleted = async function(id) {
            const bookingIndex = bookings.findIndex(b => b.id === id);
            if(bookingIndex === -1) return;

            const b = bookings[bookingIndex];
            const isCurrentlyCompleted = String(b.isSubmitted).toLowerCase() === 'true';
            const newCompletedStatus = isCurrentlyCompleted ? 'false' : 'true';
            
            b.isSubmitted = newCompletedStatus; 
            calculateAndRender(); 

            if (GOOGLE_API_URL) {
                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'update_submit', id: id, isSubmitted: newCompletedStatus })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        showToast(newCompletedStatus === 'true' ? '✅ 已標記為收回歸檔！' : '已取消紙本收回狀態');
                    } else throw new Error();
                } catch (err) {
                    b.isSubmitted = isCurrentlyCompleted ? 'true' : 'false';
                    calculateAndRender();
                    showToast('❌ 同步失敗: 請檢查網路連線', 'error');
                }
            }
        };

        window.toggleReviewStatus = async function(id) {
            const bookingIndex = bookings.findIndex(b => b.id === id);
            if(bookingIndex === -1) return;

            const b = bookings[bookingIndex];
            const isCurrentlyNeedReview = String(b.needsReview).toLowerCase() === 'true';
            const newReviewStatus = isCurrentlyNeedReview ? 'false' : 'true';
            
            b.needsReview = newReviewStatus; 
            calculateAndRender(); 

            if (GOOGLE_API_URL) {
                try {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'update_review_status', id: id, needsReview: newReviewStatus })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        showToast(newReviewStatus === 'true' ? '⭐ 已標記為待確認！' : '✅ 已取消待確認狀態');
                    } else throw new Error();
                } catch (err) {
                    b.needsReview = isCurrentlyNeedReview ? 'true' : 'false';
                    calculateAndRender();
                    showToast('❌ 狀態同步失敗，請稍後再試', 'error');
                }
            }
        };

        let editingNoteId = null;

        window.openNoteModal = function(id) {
            const b = bookings.find(x => x.id === id);
            if (!b) return;
            editingNoteId = id;
            const sysData = systemMapping[b.systemId] || {};
            document.getElementById('note-modal-system').textContent = `[${b.systemId}] ${sysData.systemName || ''}`;
            document.getElementById('note-modal-input').value = b.dashboardNote || '';
            document.getElementById('note-modal').classList.remove('hidden-el');
            lucide.createIcons();
        };

        window.closeNoteModal = function() {
            document.getElementById('note-modal').classList.add('hidden-el');
            editingNoteId = null;
        };

        window.saveDashboardNote = async function() {
            if (!editingNoteId) return;
            const newNote = document.getElementById('note-modal-input').value.trim();
            const b = bookings.find(x => x.id === editingNoteId);
            if (!b) return;

            const btnSave = document.getElementById('btn-save-note');
            const iconSave = document.getElementById('icon-save-note');
            const originalText = btnSave.querySelector('span').textContent;
            
            btnSave.querySelector('span').textContent = '儲存中...';
            iconSave.setAttribute('data-lucide', 'loader-2');
            iconSave.classList.add('animate-spin');
            btnSave.disabled = true;
            lucide.createIcons();

            try {
                if (GOOGLE_API_URL) {
                    const response = await fetch(GOOGLE_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'update_dashboard_note', id: editingNoteId, dashboardNote: newNote })
                    });
                    const result = await response.json();
                    if (result.status !== 'success') throw new Error(result.message);
                }
                
                b.dashboardNote = newNote;
                calculateAndRender();
                closeNoteModal();
                showToast('✅ 備註已儲存！');
            } catch (err) {
                showToast('❌ 儲存失敗: 請檢查網路連線', 'error');
            } finally {
                btnSave.querySelector('span').textContent = originalText;
                iconSave.setAttribute('data-lucide', 'save');
                iconSave.classList.remove('animate-spin');
                btnSave.disabled = false;
                lucide.createIcons();
            }
        };

        function calculateAndRender() {
            let totalSystems = bookings.length;
            let closedSystems = 0;    
            let recoveredSystems = 0; 
            let totalRequiredDocs = 0;
            
            bookings.forEach(b => {
                if (String(b.isSubmitted).toLowerCase() === 'true') recoveredSystems++;
                if (b.followupStatus === '已訪談完成可用印' || b.followupStatus === '承辦人自行改完後可以用印') closedSystems++;

                const category = (systemMapping[b.systemId] || {}).category || '';
                const requiredDocsArray = (category && CATEGORY_REQUIREMENTS[category]) ? CATEGORY_REQUIREMENTS[category] : CATEGORY_REQUIREMENTS["預設全部"];
                totalRequiredDocs += requiredDocsArray.length;
            });

            document.getElementById('kpi-total-systems').textContent = totalSystems;
            document.getElementById('kpi-closed-systems').textContent = closedSystems;
            const closedRate = totalSystems > 0 ? Math.round((closedSystems / totalSystems) * 100) : 0;
            document.getElementById('kpi-closed-rate').textContent = `${closedRate}%`;
            document.getElementById('bar-closed-systems').style.width = `${closedRate}%`;

            document.getElementById('kpi-total-docs').textContent = totalRequiredDocs;
            document.getElementById('kpi-recovered-systems').textContent = recoveredSystems;
            const recoveredRate = totalSystems > 0 ? Math.round((recoveredSystems / totalSystems) * 100) : 0;
            document.getElementById('kpi-recovered-rate').textContent = `${recoveredRate}%`;
            document.getElementById('bar-recovered-systems').style.width = `${recoveredRate}%`;

            const searchKw = document.getElementById('dashboard-search').value.toLowerCase().trim();
            const filterState = document.getElementById('dashboard-filter').value;

            // 依據選擇的排序欄位與方向進行動態排序
            let sortedBookings = [...bookings].sort((a, b) => {
                let valA, valB;
                
                if (currentSortKey === 'isSubmitted') {
                    valA = String(a.isSubmitted).toLowerCase() === 'true' ? 1 : 0;
                    valB = String(b.isSubmitted).toLowerCase() === 'true' ? 1 : 0;
                } else if (currentSortKey === 'system') {
                    valA = a.systemId || '';
                    valB = b.systemId || '';
                } else if (currentSortKey === 'unit') {
                    valA = a.unit || '';
                    valB = b.unit || '';
                }

                if (valA < valB) return currentSortDir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDir === 'asc' ? 1 : -1;
                return 0;
            });

            if (filterState === 'unsubmitted') {
                sortedBookings = sortedBookings.filter(b => String(b.isSubmitted).toLowerCase() !== 'true');
            } else if (filterState === 'submitted') {
                sortedBookings = sortedBookings.filter(b => String(b.isSubmitted).toLowerCase() === 'true');
            } else if (filterState === 'needs_review') {
                sortedBookings = sortedBookings.filter(b => String(b.needsReview).toLowerCase() === 'true');
            }

            if (searchKw) {
                sortedBookings = sortedBookings.filter(b => {
                    const sysData = systemMapping[b.systemId] || {};
                    return b.systemId.toLowerCase().includes(searchKw) || 
                           (sysData.systemName && sysData.systemName.toLowerCase().includes(searchKw)) ||
                           (b.unit || '').toLowerCase().includes(searchKw) ||
                           (b.contactPerson || '').toLowerCase().includes(searchKw);
                });
            }

            let tbodyHtml = '';
            sortedBookings.forEach(b => {
                const isRecovered = String(b.isSubmitted).toLowerCase() === 'true';
                const isClosed = (b.followupStatus === '已訪談完成可用印' || b.followupStatus === '承辦人自行改完後可以用印');
                const needsReview = String(b.needsReview).toLowerCase() === 'true';
                
                const sysData = systemMapping[b.systemId] || {};
                const sysName = sysData.systemName || '';
                const category = sysData.category || '';
                const dashboardNote = b.dashboardNote || '';

                let closedStatusHtml = '';
                if (isClosed) {
                    closedStatusHtml = `<span class="px-2 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded">✅ 已結案 (可印)</span>`;
                } else if (b.followupStatus === '需要再次訪談') {
                    closedStatusHtml = `<span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">🔄 需再次訪談</span>`;
                } else {
                    closedStatusHtml = `<span class="px-2 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded">🟡 訪談處理中</span>`;
                }

                let reviewStatusHtml = '';
                if (needsReview) {
                    reviewStatusHtml = `
                        <button onclick="toggleReviewStatus('${b.id}')" class="px-3 py-1 bg-amber-50 border border-amber-300 hover:bg-amber-100 text-amber-600 text-[11px] font-bold rounded-full flex items-center mx-auto w-fit gap-1 shadow-sm transition-all cursor-pointer" title="取消標記">
                            <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i> 待確認
                        </button>
                    `;
                } else {
                    reviewStatusHtml = `
                        <button onclick="toggleReviewStatus('${b.id}')" class="p-1.5 bg-white border border-slate-200 hover:bg-amber-50 hover:border-amber-300 text-slate-300 hover:text-amber-500 rounded-full flex items-center mx-auto shadow-sm transition-all cursor-pointer" title="標記為需確認">
                            <i data-lucide="star" class="w-4 h-4"></i>
                        </button>
                    `;
                }

                let recoveredStatusHtml = '';
                if (isRecovered) {
                    recoveredStatusHtml = `
                        <button onclick="toggleCompleted('${b.id}')" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold rounded-lg flex items-center w-fit gap-1.5 shadow-md transition-all cursor-pointer">
                            <i data-lucide="check-square" class="w-4 h-4"></i> 已收回歸檔
                        </button>
                    `;
                } else {
                    recoveredStatusHtml = `
                        <button onclick="toggleCompleted('${b.id}')" class="px-3 py-1.5 bg-white border border-slate-300 hover:bg-slate-50 text-slate-500 hover:text-indigo-600 hover:border-indigo-300 text-[11px] font-bold rounded-lg flex items-center w-fit gap-1.5 shadow-sm transition-all cursor-pointer group">
                            <i data-lucide="square" class="w-4 h-4 text-slate-400 group-hover:text-indigo-500"></i> 等待紙本 (點擊收回)
                        </button>
                    `;
                }

                const noteDisplay = dashboardNote 
                    ? `<div class="truncate text-slate-600 font-medium" title="${dashboardNote}">${dashboardNote}</div>` 
                    : `<span class="text-slate-400 font-medium flex items-center gap-1"><i data-lucide="edit-3" class="w-3 h-3"></i> 新增備註</span>`;

                const categoryTag = category ? `<span class="text-[10px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded border border-indigo-100 font-bold ml-1">${category}</span>` : '';

                tbodyHtml += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors ${isRecovered ? 'opacity-60 bg-slate-50/50' : ''}">
                        <td class="p-4 align-middle">
                            <div class="font-bold ${isRecovered ? 'text-slate-500 line-through' : 'text-slate-700'}">
                                ${b.systemId} ${sysName}
                                ${categoryTag}
                            </div>
                        </td>
                        <td class="p-4 align-middle">
                            <div class="text-xs text-slate-500 font-medium"><i data-lucide="building-2" class="w-3 h-3 inline"></i> ${b.unit || '-'}</div>
                            <div class="text-xs text-slate-500 font-medium mt-0.5"><i data-lucide="user" class="w-3 h-3 inline"></i> ${b.contactPerson || '-'}</div>
                        </td>
                        <td class="p-4 align-middle whitespace-nowrap">
                            ${closedStatusHtml}
                        </td>
                        <td class="p-4 align-middle text-center">
                            ${reviewStatusHtml}
                        </td>
                        <td class="p-4 align-middle whitespace-nowrap">
                            ${recoveredStatusHtml}
                        </td>
                        <td class="p-4 align-middle max-w-[12rem]">
                            <div onclick="openNoteModal('${b.id}')" class="text-xs p-2 bg-slate-50 hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 rounded cursor-pointer transition-colors">
                                ${noteDisplay}
                            </div>
                        </td>
                    </tr>
                `;
            });

            if (sortedBookings.length === 0) {
                if (filterState !== 'all' && !searchKw) {
                    tbodyHtml = `<tr><td colspan="6" class="p-12 text-center text-slate-400"><i data-lucide="check-circle" class="w-10 h-10 mx-auto mb-3 opacity-50 text-emerald-500"></i><div class="font-bold">目前沒有資料</div></td></tr>`;
                } else if (searchKw) {
                    tbodyHtml = `<tr><td colspan="6" class="p-12 text-center text-slate-400"><i data-lucide="search-x" class="w-10 h-10 mx-auto mb-3 opacity-50 text-slate-400"></i><div class="font-bold">找不到符合的系統</div></td></tr>`;
                } else {
                    tbodyHtml = `<tr><td colspan="6" class="p-8 text-center text-slate-400"><i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>目前尚無預約資料</td></tr>`;
                }
            }

            document.getElementById('dashboard-tbody').innerHTML = tbodyHtml;

            // 更新表頭的箭頭圖示狀態
            ['system', 'unit', 'isSubmitted'].forEach(k => {
                const el = document.getElementById(`sort-icon-${k}`);
                if (el) {
                    if (currentSortKey === k) {
                        el.className = 'text-indigo-500 transition-opacity opacity-100';
                        el.innerHTML = currentSortDir === 'asc' 
                            ? '<i data-lucide="arrow-up" class="w-3 h-3"></i>' 
                            : '<i data-lucide="arrow-down" class="w-3 h-3"></i>';
                    } else {
                        el.className = 'text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity';
                        el.innerHTML = '<i data-lucide="arrow-up-down" class="w-3 h-3"></i>';
                    }
                }
            });

            lucide.createIcons();
        }

        document.getElementById('dashboard-search').addEventListener('input', () => {
            calculateAndRender();
        });

        window.exportUnsubmitted = function() {
            const unsubmittedBookings = bookings.filter(b => String(b.isSubmitted).toLowerCase() !== 'true');
            
            if (unsubmittedBookings.length === 0) {
                showToast('太棒了！目前所有系統的紙本都已經繳回囉！', 'success');
                return;
            }

            const headers = ['系統編號', '系統名稱', '分類', '單位', '承辦人', '電子檔結案狀態', '需二次確認', '管理端備註', '紙本繳回狀態'];
            const rows = unsubmittedBookings.map(b => {
                const sysData = systemMapping[b.systemId] || {};
                const closedStatus = (b.followupStatus === '已訪談完成可用印' || b.followupStatus === '承辦人自行改完後可以用印') 
                                     ? '已結案(可印)' 
                                     : (b.followupStatus || '未完成');
                const needsReviewStr = String(b.needsReview).toLowerCase() === 'true' ? '是' : '否';
                
                return [
                    `"${b.systemId}"`,
                    `"${(sysData.systemName || '').replace(/"/g, '""')}"`,
                    `"${(sysData.category || '').replace(/"/g, '""')}"`,
                    `"${(b.unit || '').replace(/"/g, '""')}"`,
                    `"${(b.contactPerson || '').replace(/"/g, '""')}"`,
                    `"${closedStatus}"`,
                    `"${needsReviewStr}"`,
                    `"${(b.dashboardNote || '').replace(/"/g, '""')}"`,
                    `"未繳回"`
                ];
            });

            const content = "\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            const d = new Date();
            const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            
            link.download = `未繳回紙本清單_${dateStr}.csv`;
            link.click();
            showToast('✅ 匯出成功！');
        };

        let toastTimeout;
        window.showToast = function(message, type = 'success') {
            clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            const toastContent = document.getElementById('toast-content');
            
            toastContent.innerHTML = '';
            if (type === 'error') {
                toastContent.className = 'bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 text-white"></i> <span>${message}</span>`;
            } else {
                toastContent.className = 'bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 text-sm';
                toastContent.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i> <span>${message}</span>`;
            }
            
            lucide.createIcons();
            toast.classList.remove('hidden-el');
            
            toastTimeout = setTimeout(() => {
                toast.classList.add('hidden-el');
            }, 3000);
        };

        lucide.createIcons();
        fetchCloudData();

    </script>
</body>
</html>
